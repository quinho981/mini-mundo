name: Docker Build & Push

on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build API
        run: |
          docker build -t icarovinicius/mini-mundo-api:${{ github.ref_name }} -f docker/php/Dockerfile .

      - name: Push API
        run: |
          docker push icarovinicius/mini-mundo-api:${{ github.ref_name }}

      - name: Build Frontend
        run: |
          docker build -t icarovinicius/mini-mundo-frontend:${{ github.ref_name }} -f docker/vue/Dockerfile .

      - name: Push Frontend
        run: |
          docker push icarovinicius/mini-mundo-frontend:${{ github.ref_name }}